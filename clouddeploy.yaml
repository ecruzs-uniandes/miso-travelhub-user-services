apiVersion: deploy.cloud.google.com/v1
kind: DeliveryPipeline
metadata:
  name: user-services
description: Production delivery pipeline with canary strategy
serialPipeline:
  stages:
    - targetId: prod
      profiles: [prod]
      strategy:
        canary:
          runtimeConfig:
            cloudRun:
              automaticTrafficControl: true
          canaryDeployment:
            percentages: [10, 50]
            verify: true
---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: prod
description: Production environment
requireApproval: true
run:
  location: projects/travelhub-prod-492116/locations/us-central1
