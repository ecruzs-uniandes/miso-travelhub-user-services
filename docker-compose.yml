services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: travelhub
      POSTGRES_PASSWORD: travelhub_dev
      POSTGRES_DB: travelhub_users
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelhub -d travelhub_users"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: development
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
