apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: user-services-prod
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: user-services
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: "2"
              memory: 1Gi
          env:
            - name: ENVIRONMENT
              value: prod
            - name: DEBUG
              value: "false"
            - name: JWT_ALGORITHM
              value: RS256
            - name: JWT_ISSUER
              value: https://auth.travelhub.app
            - name: JWT_AUDIENCE
              value: travelhub-api
            - name: JWT_ACCESS_TTL
              value: "900"
            - name: JWT_REFRESH_TTL
              value: "604800"
            - name: BCRYPT_ROUNDS
              value: "12"
            - name: MAX_LOGIN_ATTEMPTS
              value: "5"
            - name: LOCKOUT_MINUTES
              value: "15"
            - name: RATE_LIMIT_REQUESTS
              value: "100"
            - name: RATE_LIMIT_WINDOW_SECONDS
              value: "60"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: DATABASE_URL
                  key: latest
            - name: DATABASE_URL_SYNC
              valueFrom:
                secretKeyRef:
                  name: DATABASE_URL_SYNC
                  key: latest
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
